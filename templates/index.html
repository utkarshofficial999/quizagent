<!DOCTYPE html>
<html>
<head>
    <title>Quiz Solver Agent</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 500px; }
        h1 { color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 13px; }
        input, textarea { width: 100%; padding: 10px 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 13px; transition: border-color 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 60px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; }
        .result.success { background: #d4edda; color: #155724; display: block; }
        .result.error { background: #f8d7da; color: #721c24; display: block; }
        .status { text-align: center; margin-top: 15px; color: #666; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f3f3f3; border-top: 2px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 6px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hint { font-size: 11px; color: #999; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quiz Solver Agent</h1>
        <p class="subtitle">Auto-fill & Solve Microsoft Forms</p>
        
        <div class="hint">* Required fields</div>
        
        <form id="quizForm">
            <div class="form-group">
                <label>Quiz URL *</label>
                <input type="url" name="url" required placeholder="https://forms.cloud.microsoft/...">
            </div>
            
            <div class="form-group">
                <label>Email (for login, optional)</label>
                <input type="email" name="email" placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label>Password (for login, optional)</label>
                <input type="password" name="password" placeholder="Your password">
            </div>
            
            <div class="form-group">
                <label>Name *</label>
                <input type="text" name="name" required placeholder="Utkarsh Yadav">
            </div>
            
            <div class="form-group">
                <label>Class/Section *</label>
                <input type="text" name="class_section" required placeholder="CSE-25 or 29">
            </div>
            
            <div class="form-group">
                <label>Roll Number *</label>
                <input type="text" name="roll_no" required placeholder="2400320101209">
            </div>
            
            <button type="submit" id="submitBtn">Solve Quiz</button>
        </form>
        
        <div class="status" id="status" style="display:none;">
            <span class="spinner"></span>
            <span id="statusText">Solving...</span>
        </div>
        
        <div class="result" id="result"></div>
    </div>
    
    <script>
        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                url: formData.get('url'),
                email: formData.get('email'),
                password: formData.get('password'),
                name: formData.get('name'),
                class_section: formData.get('class_section'),
                roll_no: formData.get('roll_no')
            };
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('status').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                const response = await fetch('/solve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    document.getElementById('result').className = 'result success';
                    document.getElementById('result').textContent = result.message;
                } else {
                    document.getElementById('result').className = 'result error';
                    document.getElementById('result').textContent = result.message;
                }
            } catch (err) {
                document.getElementById('result').className = 'result error';
                document.getElementById('result').textContent = 'Error: ' + err.message;
            }
            
            document.getElementById('submitBtn').disabled = false;
        });
    </script>
</body>
</html>
